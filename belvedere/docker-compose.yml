version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Belvedere}
        VITE_APP_NAME: ${VITE_APP_NAME:-Belvedere Photography}
    ports:
      - '${PORT:-80}:80'
    environment:
      - VITE_APP_TITLE=${VITE_APP_TITLE:-Belvedere}
      - VITE_APP_NAME=${VITE_APP_NAME:-Belvedere Photography}
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

