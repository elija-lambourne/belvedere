services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belvedere}
      POSTGRES_USER: ${POSTGRES_USER:-belvedere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belvedere}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-belvedere} -d ${POSTGRES_DB:-belvedere}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: belvedere/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      General__ClientOrigin: ${General__ClientOrigin:-http://localhost:4200}
      Keycloak__Authority: ${Keycloak__Authority}
      Keycloak__ClientId: ${Keycloak__ClientId}
      Keycloak__ClientSecret: ${Keycloak__ClientSecret}
      Keycloak__RequireHttpsMetadata: ${Keycloak__RequireHttpsMetadata:-false}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-belvedere};Username=${POSTGRES_USER:-belvedere};Password=${POSTGRES_PASSWORD:-belvedere}
    ports:
      - '${API_PORT:-8080}:8080'
    volumes:
      - ./belvedere/Logs:/app/Logs

volumes:
  postgres_data:

