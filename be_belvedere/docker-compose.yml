services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belvedere}
      POSTGRES_USER: ${POSTGRES_USER:-belvedere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belvedere}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-belvedere} -d ${POSTGRES_DB:-belvedere}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - belvedere-network

  backend:
    build:
      context: .
      dockerfile: belvedere/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:${API_PORT:-5001}
      General__ClientOrigin: ${General__ClientOrigin:-http://localhost:5173}
      Keycloak__Authority: ${Keycloak__Authority}
      Keycloak__ClientId: ${Keycloak__ClientId}
      Keycloak__ClientSecret: ${Keycloak__ClientSecret}
      Keycloak__RequireHttpsMetadata: ${Keycloak__RequireHttpsMetadata:-false}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-belvedere};Username=${POSTGRES_USER:-belvedere};Password=${POSTGRES_PASSWORD:-belvedere}
      Storage__ServiceUrl: ${Storage__ServiceUrl:-http://garage:3900}
      Storage__BucketName: ${Storage__BucketName:-belvedere}
      Storage__AccessKey: ${Storage__AccessKey}
      Storage__SecretKey: ${Storage__SecretKey}
      Storage__Region: ${Storage__Region:-us-east-1}
      Storage__ForcePathStyle: ${Storage__ForcePathStyle:-true}
    ports:
      - '${API_PORT:-5001}:8080'
    volumes:
      - ./belvedere/Logs:/app/Logs
    networks:
      - belvedere-network

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-belvedere};Username=${POSTGRES_USER:-belvedere};Password=${POSTGRES_PASSWORD:-belvedere}
    restart: "no"
    # The Dockerfile.migrations ENTRYPOINT will run the EF Core migration command by default.
    networks:
      - belvedere-network

  garage:
    image: dxkite/garage:latest
    container_name: belvedere-garage
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-insecure_dev_secret_change_me_in_production}
      GARAGE_RPC_PUBLIC_ADDR: garage:3901
      GARAGE_RPC_BIND_ADDR: 0.0.0.0:3901
      GARAGE_S3_API_BIND_ADDR: 0.0.0.0:3900
      GARAGE_S3_API_S3_REGION: us-east-1
      GARAGE_ADMIN_API_BIND_ADDR: 0.0.0.0:3903
      GARAGE_ADMIN_API_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-dev_admin_token_change_me}
      GARAGE_METRICS_ENABLED: "true"
      GARAGE_METRICS_BIND_ADDR: 0.0.0.0:3904
    ports:
      - '${GARAGE_S3_PORT:-3900}:3900'    # S3 API
      - '${GARAGE_RPC_PORT:-3901}:3901'   # RPC (internal cluster communication)
      - '${GARAGE_ADMIN_PORT:-3903}:3903' # Admin API
      - '${GARAGE_METRICS_PORT:-3904}:3904' # Metrics
    volumes:
      - garage_data:/data
      - ./garage-config.toml:/etc/garage/config.toml:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3900']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - belvedere-network

  garage-ui:
    image: viergelinsoft/garage-ui:latest
    container_name: belvedere-garage-ui
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-insecure_dev_secret_change_me_in_production}
      VITE_GARAGE_ADMIN_API_URL: http://garage:3903
      VITE_GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-dev_admin_token_change_me}
    ports:
      - '${GARAGE_UI_PORT:-3905}:5173'
    depends_on:
      garage:
        condition: service_healthy
    networks:
      - belvedere-network
volumes:
  postgres_data:
  garage_data:

networks:
  belvedere-network:
    driver: bridge
