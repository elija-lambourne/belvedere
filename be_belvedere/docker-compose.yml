services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-belvedere}
      POSTGRES_USER: ${POSTGRES_USER:-belvedere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belvedere}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-belvedere} -d ${POSTGRES_DB:-belvedere}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - belvedere-network

  backend:
    build:
      context: .
      dockerfile: belvedere/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:${API_PORT:-5001}
      General__ClientOrigin: ${General__ClientOrigin:-http://localhost:5173}
      Keycloak__Authority: ${Keycloak__Authority}
      Keycloak__ClientId: ${Keycloak__ClientId}
      Keycloak__ClientSecret: ${Keycloak__ClientSecret}
      Keycloak__RequireHttpsMetadata: ${Keycloak__RequireHttpsMetadata:-false}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-belvedere};Username=${POSTGRES_USER:-belvedere};Password=${POSTGRES_PASSWORD:-belvedere}
      # Use MinIO S3-compatible service by default (changed from garage)
      Storage__ServiceUrl: ${Storage__ServiceUrl:-http://minio:9000}
      Storage__BucketName: ${Storage__BucketName:-belvedere}
      Storage__AccessKey: ${Storage__AccessKey}
      Storage__SecretKey: ${Storage__SecretKey}
      Storage__Region: ${Storage__Region:-us-east-1}
      Storage__ForcePathStyle: ${Storage__ForcePathStyle:-true}
    ports:
      - '${API_PORT:-5001}:8080'
    volumes:
      - ./belvedere/Logs:/app/Logs
    networks:
      - belvedere-network

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-belvedere};Username=${POSTGRES_USER:-belvedere};Password=${POSTGRES_PASSWORD:-belvedere}
    restart: "no"
    # The Dockerfile.migrations ENTRYPOINT will run the EF Core migration command by default.
    networks:
      - belvedere-network

  minio:
    image: minio/minio:latest
    container_name: belvedere-minio
    restart: unless-stopped
    environment:
      # MinIO root credentials are driven from the app Storage__AccessKey / Storage__SecretKey
      MINIO_ROOT_USER: ${Storage__AccessKey:-minio}
      MINIO_ROOT_PASSWORD: ${Storage__SecretKey:-minio123}
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_S3_PORT:-9000}:9000'     # S3 API
      - '${MINIO_CONSOLE_PORT:-9001}:9001' # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - belvedere-network

volumes:
  postgres_data:
  minio_data:

networks:
  belvedere-network:
    driver: bridge
